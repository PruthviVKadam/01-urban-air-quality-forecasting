name: CI

on:
  push:
    branches: [main]
  pull_request:

# G0 — lint + type-check + tests run on every push, and the committed OpenAPI
# contract + generated TS types must stay in sync with the code.
jobs:
  backend:
    name: backend (lint · types · tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (Python 3.12)
        run: uv sync --frozen

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Mypy (type-check)
        run: uv run mypy app

      - name: Pytest
        run: uv run pytest

      - name: OpenAPI contract is in sync
        run: |
          uv run python scripts/export_openapi.py
          git diff --exit-code openapi.json \
            || (echo "::error::openapi.json is stale — run scripts/export_openapi.py and commit." && exit 1)

  frontend:
    name: frontend (lint · types · tests · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generated types match the contract
        run: |
          npm run gen:types
          git diff --exit-code src/api/types.ts \
            || (echo "::error::src/api/types.ts is stale — run npm run gen:types and commit." && exit 1)

      - name: ESLint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Vitest
        run: npm run test

      - name: Build
        run: npm run build
