version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data
    environment:
      - OPENMETEO_CACHE_DIR=/data/.cache
      # You can add additional env vars here or via a .env file
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Pass the backend URL to the Vite build so it gets baked into the static assets
        VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
